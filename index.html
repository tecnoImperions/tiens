<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mi aplicación PWA">
  <meta name="theme-color" content="#007bff">
  
  <title>Mi App PWA</title>
  
  <!-- Favicon -->
  <link rel="icon" href="https://res.cloudinary.com/dv6d41ect/image/upload/v1769974482/photo_5186249765740547232_y_kvdq0u.jpg" type="image/jpeg">
  <link rel="apple-touch-icon" href="https://res.cloudinary.com/dv6d41ect/image/upload/v1769974482/photo_5186249765740547232_y_kvdq0u.jpg">
  
  <!-- Manifest PWA -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  
  <style>
    body {
      padding-top: 56px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    
    .card {
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    
    .btn-install {
      display: none;
    }
    
    .feature-icon {
      font-size: 3rem;
      color: #667eea;
    }
  </style>
</head>
<body>
  
  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">
        <i class="bi bi-app-indicator"></i> Mi App PWA
      </a>
      <button class="btn btn-outline-light btn-sm btn-install" id="installBtn">
        <i class="bi bi-download"></i> Instalar
      </button>
    </div>
  </nav>

  <!-- Contenido Principal -->
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        
        <!-- Card Principal -->
        <div class="card mb-4">
          <div class="card-body text-center p-5">
            <i class="bi bi-rocket-takeoff feature-icon mb-3"></i>
            <h1 class="card-title mb-3">¡Bienvenido a Mi App!</h1>
            <p class="card-text text-muted mb-4">
              Esta es una Progressive Web App simple y responsive. Puedes instalarla en tu dispositivo móvil.
            </p>
            <button class="btn btn-primary btn-lg">
              <i class="bi bi-play-fill"></i> Comenzar
            </button>
          </div>
        </div>

        <!-- Features -->
        <div class="row g-4">
          <div class="col-md-4">
            <div class="card h-100">
              <div class="card-body text-center">
                <i class="bi bi-phone feature-icon"></i>
                <h5 class="mt-3">Responsive</h5>
                <p class="text-muted">Funciona en todos los dispositivos</p>
              </div>
            </div>
          </div>
          
          <div class="col-md-4">
            <div class="card h-100">
              <div class="card-body text-center">
                <i class="bi bi-cloud-download feature-icon"></i>
                <h5 class="mt-3">Instalable</h5>
                <p class="text-muted">Descarga como app nativa</p>
              </div>
            </div>
          </div>
          
          <div class="col-md-4">
            <div class="card h-100">
              <div class="card-body text-center">
                <i class="bi bi-lightning-charge feature-icon"></i>
                <h5 class="mt-3">Rápida</h5>
                <p class="text-muted">Carga instantánea</p>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  
  <!-- PWA Script -->
  <script>
    // Registrar Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker registrado'))
          .catch(err => console.log('Error al registrar SW:', err));
      });
    }

    // Botón de instalación
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'block';
    });

    installBtn.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log(`Usuario ${outcome === 'accepted' ? 'aceptó' : 'rechazó'} la instalación`);
        deferredPrompt = null;
        installBtn.style.display = 'none';
      }
    });
  </script>

</body>
</html>
